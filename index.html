<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매가 분석 대시보드</title>
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f4;
  --color-text-primary:#18181b;
  --color-text-secondary:#71717a;
  --color-border-tertiary:rgba(0,0,0,.10);
  --color-border-secondary:rgba(0,0,0,.18);
  --font-sans:system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1c1c1e;
    --color-background-secondary:#2c2c2e;
    --color-text-primary:#f5f5f5;
    --color-text-secondary:#a1a1aa;
    --color-border-tertiary:rgba(255,255,255,.10);
    --color-border-secondary:rgba(255,255,255,.18);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);font-size:13px;background:var(--color-background-secondary)}
.pnav{display:flex;gap:2px;padding:0 20px;background:var(--color-background-primary);border-bottom:1px solid var(--color-border-secondary);overflow-x:auto}
.pn{padding:14px 18px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:inherit;letter-spacing:.02em;transition:color .15s}
.pn:hover{color:var(--color-text-primary)}
.pn.on{color:var(--color-text-primary);border-bottom-color:#18181b;font-weight:500}
.vtabs{display:flex;gap:4px;padding:16px 20px 0;background:var(--color-background-primary)}
.vt{padding:9px 18px;font-size:12px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;background:transparent;color:var(--color-text-secondary);font-family:inherit;transition:all .15s}
.vt:hover{background:var(--color-background-secondary)}
.vt.on{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-color:var(--color-border-secondary)}
.content{padding:20px}
.card{background:var(--color-background-primary);border-radius:10px;border:1px solid var(--color-border-tertiary);padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--color-text-secondary);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:block;width:3px;height:14px;border-radius:2px;background:#18181b;flex-shrink:0}
.lbl{font-size:11px;color:var(--color-text-secondary);letter-spacing:.04em;display:block;margin-bottom:5px}
select,input[type=number]{padding:8px 10px;border:1px solid var(--color-border-secondary);border-radius:6px;font-size:12px;color:var(--color-text-primary);background:var(--color-background-primary);font-family:inherit;width:100%}
input[type=range]{width:100%;accent-color:#18181b;margin:6px 0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
.four{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--color-background-secondary);border-radius:8px;padding:14px 16px;border:1px solid var(--color-border-tertiary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;letter-spacing:.03em}
.stat-v{font-size:20px;font-weight:500;letter-spacing:-.03em;line-height:1}
.stat-v.blu{color:#185FA5}
.stat-v.grn{color:#27500A}
.stat-v.red{color:#A32D2D}
.divider{height:1px;background:var(--color-border-tertiary);margin:16px 0}
.cmp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--color-border-tertiary);font-size:12px}
.cmp-row:last-child{border:none}
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sl-row .lbl{margin:0;flex-shrink:0;min-width:40px}
.sl-val{font-size:12px;font-weight:500;min-width:30px;text-align:right;flex-shrink:0}
.badge{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;text-align:center}
.badge.pos{background:#EAF3DE;color:#27500A}
.badge.neg{background:#FCEBEB;color:#A32D2D}
.badge.neu{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tbl-wrap{overflow:auto;border-radius:8px;border:1px solid var(--color-border-secondary)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:580px}
thead th{padding:10px 12px;font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--color-text-secondary);background:var(--color-background-secondary);border-bottom:1px solid var(--color-border-secondary);text-align:right;white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:first-child{text-align:left}
td{padding:9px 12px;border-bottom:1px solid var(--color-border-tertiary);text-align:right;color:var(--color-text-primary)}
td:first-child{text-align:left;color:var(--color-text-secondary);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
tfoot td{padding:10px 12px;font-weight:500;background:var(--color-background-secondary);border-top:1px solid var(--color-border-secondary);text-align:right}
tfoot td:first-child{text-align:left}
.vi{width:60px;padding:4px 6px;border:1px solid var(--color-border-secondary);border-radius:4px;font-size:12px;text-align:right;background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit}
.q-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.q-row input[type=number]{width:90px;padding:6px 8px}
.btn{padding:7px 12px;font-size:11px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary);border-radius:6px;cursor:pointer;color:var(--color-text-secondary);font-family:inherit;white-space:nowrap;transition:all .12s}
.btn:hover{background:#18181b;color:#fff;border-color:#18181b}
.rec-hero{border-radius:10px;padding:24px;margin-bottom:16px;color:#fff}
.pos-bar{height:8px;background:#E5E5E5;border-radius:4px;overflow:hidden;margin:8px 0}
.pos-fill{height:100%;border-radius:4px;background:#18181b;transition:width .4s}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rec-card{background:var(--color-background-primary);border-radius:10px;border:1px solid var(--color-border-tertiary);padding:18px}
.rec-card.accent{border-color:#18181b;border-width:2px}
.insight-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--color-border-tertiary)}
.insight-item:last-child{border:none}
.insight-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rank-pill{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:500}
@media(max-width:580px){.two,.rec-grid,.four,.three{grid-template-columns:1fr}}
</style>
</head>

function calcRec(){
  const qi=0;
  const opts=D[prod];
  let totalGap=0,totalOpts=0,cheapCount=0,expCount=0,midCount=0;
  const rows=[];
  opts.forEach(o=>{
    const us=o.op[qi];
    const cpx=CK.slice(1).map(k=>o[k]?o[k][qi]:null).filter(v=>v&&v>0);
    if(!cpx.length){rows.push({k:o.k,us,mn:null,avg:null,mx:null,pct:null,rec:0});return;}
    const mn=Math.min(...cpx),mx=Math.max(...cpx),avg=cpx.reduce((a,b)=>a+b,0)/cpx.length;
    const pct=us/avg;
    let rec=0;
    if(pct<0.80){rec=Math.round((avg*0.88-us)/us*100);cheapCount++;}
    else if(pct<0.90){rec=Math.round((avg*0.93-us)/us*100);cheapCount++;}
    else if(pct<0.98){rec=Math.round((avg*0.97-us)/us*100);midCount++;}
    else if(pct<1.05){rec=0;midCount++;}
    else{rec=Math.round((avg*1.0-us)/us*100);expCount++;}
    totalGap+=pct;totalOpts++;
    rows.push({k:o.k,us,mn,avg:Math.round(avg),mx,pct,rec:Math.max(-30,Math.min(50,rec))});
  });

  return{rows,overallRec:Math.max(-20,Math.min(40,overallRec)),avgPct,cheapCount,midCount,expCount,totalOpts};
}

  document.getElementById('rhero').style.background=heroColor;
  document.getElementById('rhero').innerHTML=
    `<div style="font-size:11px;letter-spacing:.08em;opacity:.6;margin-bottom:8px">추천 판매가 분석 · ${prod}</div>`+
    `<div style="font-size:28px;font-weight:500;letter-spacing:-.04em;margin-bottom:6px">${overallRec>0?'+':''}${overallRec}% ${overallRec>0?'인상':'인하'} 권장</div>`+
    `<div style="font-size:13px;opacity:.7">현재 시장 대비 ${posLabel} · 전체 ${totalOpts}개 옵션 기준 (1개 수량)</div>`;
  const diagItems=[
    {icon:'📊',label:'시장 대비 평균 포지션',val:`${pctStr>=0?'+':''}${pctStr}%`,color:pctStr<-10?'#FAEEDA':pctStr>10?'#FCEBEB':'#EAF3DE',tcolor:pctStr<-10?'#633806':pctStr>10?'#501313':'#173404'},
    {icon:'⬇',label:'저평가 옵션 수',val:`${cheapCount}개`,color:'#FAEEDA',tcolor:'#633806'},
    {icon:'✓',label:'적정가 옵션 수',val:`${midCount}개`,color:'#EAF3DE',tcolor:'#173404'},
    {icon:'⬆',label:'고가 옵션 수',val:`${expCount}개`,color:'#FCEBEB',tcolor:'#501313'},
  ];
  document.getElementById('rdiag').innerHTML=diagItems.map(d=>
    `<div class="insight-item"><div class="insight-icon" style="background:${d.color};color:${d.tcolor}">${d.icon}</div><div><div style="font-size:12px;font-weight:500;margin-bottom:2px">${d.label}</div><div style="font-size:16px;font-weight:500;color:${d.tcolor}">${d.val}</div></div></div>`
  ).join('');
  const reasons=[];
  if(cheapCount>totalOpts*0.5)reasons.push({t:'가격 경쟁력 과다',d:`전체 옵션의 ${Math.round(cheapCount/totalOpts*100)}%가 시장 평균 대비 7% 이상 저렴합니다. 브랜드 가치 대비 저평가되어 있을 가능성이 있습니다.`});
  if(avgPct<0.88)reasons.push({t:'인상 여력 존재',d:`현재 가격은 경쟁사 평균 대비 ${Math.round((1-avgPct)*100)}% 낮은 수준입니다. ${overallRec}% 인상 후에도 시장 내 경쟁력을 유지할 수 있습니다.`});
  if(avgPct>=0.93&&avgPct<=1.05)reasons.push({t:'최적 포지션 유지',d:'현재 가격이 시장 평균 대비 ±5% 내에 위치하여 경쟁력과 수익성의 균형이 잡혀 있습니다.'});
  if(expCount>totalOpts*0.3)reasons.push({t:'일부 옵션 가격 조정 필요',d:`${expCount}개 옵션이 경쟁사 평균을 초과합니다. 선택적 인하 또는 차별화 포인트 강화가 필요합니다.`});
  if(!reasons.length)reasons.push({t:'현행 가격 유지 권장',d:'경쟁사 대비 현재 포지션이 안정적입니다. 큰 변화보다 세부 옵션별 미세 조정을 권장합니다.'});
  document.getElementById('rreason').innerHTML=reasons.map(r=>
    `<div class="insight-item"><div><div style="font-size:12px;font-weight:500;margin-bottom:3px">${r.t}</div><div style="font-size:11px;color:var(--color-text-secondary);line-height:1.6">${r.d}</div></div></div>`
  ).join('');
  const simVol=500;
  const curTotal=D[prod].reduce((s,o)=>s+o.op[0]*simVol,0);
  const newTotal=Math.round(curTotal*(1+overallRec/100));
  const diffTotal=newTotal-curTotal;
  const cls=diffTotal>0?'grn':diffTotal<0?'red':'';
  document.getElementById('reffect').innerHTML=
    `<div class="stat"><div class="stat-l">현재 예상 월매출 (옵션당 500개)</div><div class="stat-v">${W(curTotal)}</div></div>`+
    `<div class="stat"><div class="stat-l">인상 적용 후 예상 월매출</div><div class="stat-v blu">${W(newTotal)}</div></div>`+
    `<div class="stat"><div class="stat-l">월 매출 증감</div><div class="stat-v ${cls}">${diffTotal>=0?'+':''}${W(diffTotal)}</div></div>`;
  document.getElementById('rpos').innerHTML=rows.map(r=>{
    if(!r.avg)return`<tr><td title="${r.k}">${r.k}</td><td>${W(r.us)}</td><td colspan="3" style="color:var(--color-text-secondary);text-align:center">경쟁사 데이터 없음</td><td>-</td><td>-</td></tr>`;
    const p=r.pct,pos=p<0.88?'저평가':p<0.98?'적정':p<1.08?'소폭고가':'고가';
    const posColor=p<0.88?'#633806':p<0.98?'#173404':p<1.08?'#185FA5':'#501313';
    const posBg=p<0.88?'#FAEEDA':p<0.98?'#EAF3DE':p<1.08?'#E6F1FB':'#FCEBEB';
    const pctFill=Math.min(100,Math.round(p*50));
    return`<tr>
      <td title="${r.k}">${r.k}</td>
      <td style="font-weight:500">${W(r.us)}</td>
      <td>${W(r.mn)}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="pos-bar" style="width:60px;flex-shrink:0"><div class="pos-fill" style="width:${pctFill}%"></div></div>${W(r.avg)}</div></td>
      <td>${W(r.mx)}</td>
      <td><span class="rank-pill" style="background:${posBg};color:${posColor}">${pos}</span></td>
      <td style="font-weight:500;color:${r.rec>0?'#27500A':r.rec<0?'#A32D2D':'var(--color-text-secondary)'}">${r.rec>0?'+':''}${r.rec}%</td>
    </tr>`;
  }).join('');
}

window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
